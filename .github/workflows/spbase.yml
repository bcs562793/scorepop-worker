name: 🕰️ ScorePop – Geçmiş Veri Yükleme (Backfill)
on:
  workflow_dispatch:
    inputs:
      from_date:
        description: 'Başlangıç tarihi (YYYY-MM-DD)'
        required: true
        type: string
      to_date:
        description: 'Bitiş tarihi (YYYY-MM-DD)'
        required: true
        type: string
      force_rescrape:
        description: 'Zaten çekilmiş günleri tekrar çek?'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - name: 📥 Repo çek
        uses: actions/checkout@v4
      - name: 🟢 Node.js 20 kur
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: 📦 Bağımlılıkları yükle
        run: npm install
      - name: 🕰️ Backfill çalıştır
        run: |
          node scraper_supabase.js \
            --mode=backfill \
            --from=${{ github.event.inputs.from_date }} \
            --to=${{ github.event.inputs.to_date }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          FORCE_RESCRAPE: ${{ github.event.inputs.force_rescrape }}
      - name: 📤 Log kaydet
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backfill-log-${{ github.event.inputs.from_date }}-${{ github.event.inputs.to_date }}
          path: '*.log'
          retention-days: 30
