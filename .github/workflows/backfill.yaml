name: 🕰️ ScorePop - Geçmiş Veri Yükleme (Backfill)

on:
  workflow_dispatch:
    inputs:
      from_date:
        description: 'Başlangıç tarihi (YYYY-MM-DD) – örn: 2026-01-01'
        required: true
        type: string
      to_date:
        description: 'Bitiş tarihi (YYYY-MM-DD) – örn: 2026-01-31'
        required: true
        type: string
      force_rescrape:
        description: 'Zaten çekilmiş günleri tekrar çekip üstüne yazsın mı?'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 350  # Max ~6 saat (GitHub Actions limiti)

    steps:
      - name: 📥 Repo Çek
        uses: actions/checkout@v4

      - name: 🟢 Node.js 20 Kur
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Bağımlılıkları Yükle
        run: npm ci

      - name: 🖥️ Chromium Sistem Kütüphaneleri
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libnss3 libatk1.0-0 libatk-bridge2.0-0 libdrm2 \
            libxkbcommon0 libxcomposite1 libxdamage1 libxfixes3 \
            libxrandr2 libgbm1 libasound2 libpango-1.0-0 libcairo2 \
            fonts-liberation libappindicator3-1 xdg-utils

      - name: 🕰️ Backfill (Zaman Makinesi) Çalıştır
        run: |
          node scraper.js \
            --mode=backfill \
            --from=${{ github.event.inputs.from_date }} \
            --to=${{ github.event.inputs.to_date }}
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FORCE_RESCRAPE: ${{ github.event.inputs.force_rescrape }}

      - name: 📊 Özet Raporu Göster
        if: always()
        run: echo "Backfill tamamlandı → ${{ github.event.inputs.from_date }} ile ${{ github.event.inputs.to_date }} arası"

      - name: 📤 Log Kaydet
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backfill-log-${{ github.event.inputs.from_date }}-${{ github.event.inputs.to_date }}
          path: '*.log'
          retention-days: 30
