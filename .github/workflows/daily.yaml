name: 📅 ScorePop - Günlük Maçlar Botu

on:
  schedule:
    - cron: '30 1 * * *'
  workflow_dispatch:

jobs:
  daily-scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 📥 Repo Çek
        uses: actions/checkout@v4

      - name: 🟢 Node.js 20 Kur
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # cache: 'npm'  <-- BU SATIRI SİLDİK

      - name: 📦 Bağımlılıkları Yükle
        run: npm install  # <-- npm ci YERİNE npm install YAPTIK

      - name: 🖥️ Chromium Sistem Kütüphaneleri
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libnss3 \
            libatk1.0-0 \
            libatk-bridge2.0-0 \
            libcups2 \
            libdrm2 \
            libxkbcommon0 \
            libxcomposite1 \
            libxdamage1 \
            libxfixes3 \
            libxrandr2 \
            libgbm1 \
            libasound2 \
            libpango-1.0-0 \
            libcairo2 \
            fonts-liberation \
            xdg-utils

      - name: 🤖 Dünün Maçlarını Çek ve Firestore'a Yaz
        run: node scraper.js --mode=daily
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
