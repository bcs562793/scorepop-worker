name: 📅 ScorePop - Günlük Maçlar Botu

on:
  schedule:
    - cron: '30 1 * * *'
  workflow_dispatch:

jobs:
  daily-scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 📥 Repo Çek
        uses: actions/checkout@v4

      - name: 🟢 Node.js 20 Kur
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # cache: 'npm'  <-- BU SATIRI SİLDİK

      - name: 📦 Bağımlılıkları Yükle
        run: npm install

      - name: 🖥️ Chrome ve Sistem Kütüphanelerini Kur
        # Puppeteer'ın kendi aracı, Ubuntu sürümüne göre eksik ne varsa kendi bulup kurar.
        run: npx puppeteer browsers install chrome --install-deps

      - name: 🤖 Dünün Maçlarını Çek ve Firestore'a Yaz
        run: node scraper.js --mode=daily
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
