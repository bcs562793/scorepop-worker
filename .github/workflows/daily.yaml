name: 📅 ScorePop - Maç Çekme Botu


  workflow_dispatch:
    inputs:
      mode:
        description: 'Mod'
        required: true
        default: 'daily'
        type: choice
        options:
          - daily
          - single
          - backfill
      date:
        description: 'Tek gün → YYYY-MM-DD  (örn: 2026-02-26)'
        required: false
        default: ''
        type: string
      from_date:
        description: 'Backfill başlangıç → YYYY-MM-DD'
        required: false
        default: ''
        type: string
      to_date:
        description: 'Backfill bitiş → YYYY-MM-DD'
        required: false
        default: ''
        type: string

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: 📥 Repo Çek
        uses: actions/checkout@v4

      - name: 🟢 Node.js 20 Kur
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Bağımlılıkları Yükle
        run: npm install

      - name: 🖥️ Chrome Kur
        run: npx puppeteer browsers install chrome --install-deps

      # ── Otomatik ──────────────────────────────────────────────────────────
      - name: 🤖 Otomatik — Dünü Çek
        if: github.event_name == 'schedule'
        run: node scraper.js --mode=daily
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      # ── Manuel ────────────────────────────────────────────────────────────
      - name: 📅 Manuel — Dünü Çek
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'daily'
        run: node scraper.js --mode=daily
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: 🗓️ Manuel — Tek Gün
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'single'
        run: node scraper.js --mode=single --date=${{ github.event.inputs.date }}
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: 🕰️ Manuel — Backfill
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'backfill'
        run: node scraper.js --mode=backfill --from=${{ github.event.inputs.from_date }} --to=${{ github.event.inputs.to_date }}
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      # ── Log her zaman yükle (başarılı veya başarısız) ─────────────────────
      - name: 📤 Log Yükle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-log-${{ github.run_id }}
          path: scraper.log   # ← *.log yerine tam isim, bulunamazsa hata vermez
          if-no-files-found: warn
          retention-days: 7
