name: 📅 ScorePop - Günlük Maçlar Botu

on:
  schedule:
    - cron: '30 1 * * *'   # Her gece 01:30 UTC (TR sabahı 04:30)
  workflow_dispatch:        # GitHub üzerinden manuel tetikleme butonu

jobs:
  daily-scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 📥 Repo Çek
        uses: actions/checkout@v4

      - name: 🟢 Node.js 20 Kur
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Bağımlılıkları Yükle
        run: npm ci

      - name: 🖥️ Chromium Sistem Kütüphaneleri (Puppeteer için)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libnss3 libatk1.0-0 libatk-bridge2.0-0 libdrm2 \
            libxkbcommon0 libxcomposite1 libxdamage1 libxfixes3 \
            libxrandr2 libgbm1 libasound2 libpango-1.0-0 libcairo2 \
            fonts-liberation libappindicator3-1 xdg-utils

      - name: 🤖 Dünün Maçlarını Çek ve Firestore'a Yaz
        run: node scraper.js --mode=daily
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: 📤 Log Dosyasını Kaydet (Hata Durumunda)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: daily-error-log-${{ github.run_id }}
          path: '*.log'
          retention-days: 7
